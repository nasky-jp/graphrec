<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Card</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --text: #1a1a1a;
      --text-muted: #555555;
      --accent: #0066cc;
      --accent-light: #e8f0fb;
      --border: #dddddd;
      --term-bg: #f0f6ff;
      --term-border: #0066cc;
      --conclusion-bg: #fffbea;
      --conclusion-border: #f0c040;
      --chat-user-bg: #0066cc;
      --chat-bot-bg: #f5f5f5;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e8e8e8;
      --text-muted: #aaaaaa;
      --accent: #4da6ff;
      --accent-light: #1a2a3a;
      --border: #333333;
      --term-bg: #1a2535;
      --term-border: #4da6ff;
      --conclusion-bg: #2a2518;
      --conclusion-border: #c9a227;
      --chat-user-bg: #1a4a8a;
      --chat-bot-bg: #1e1e1e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; }

    /* 戻るリンク */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .back-link:hover { text-decoration: underline; }

    /* ヘッダー */
    .page-header {
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent);
    }
    .page-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .page-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
    .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .meta-date { font-size: 0.8rem; color: var(--text-muted); }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 10px;
      border: 1px solid var(--accent);
      font-weight: 600;
    }

    /* 用語解説ボックス */
    .term-box {
      background: var(--term-bg);
      border-left: 4px solid var(--term-border);
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      margin: 16px 0;
    }
    .term-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
    }
    .term-box p { font-size: 0.9rem; color: var(--text-muted); }

    /* セクション */
    .section { margin: 24px 0; }
    .section-heading {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .section-num { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .section-body {
      background: var(--surface);
      border-radius: 8px;
      padding: 16px;
    }
    .section-body p { margin-bottom: 8px; }
    .section-body p:last-child { margin-bottom: 0; }
    .section-body ul { padding-left: 20px; margin-bottom: 8px; }
    .section-body li { margin-bottom: 5px; color: var(--text); font-size: 0.95rem; }
    .analogy {
      font-style: italic;
      color: var(--text-muted);
      background: var(--bg);
      border-left: 3px solid var(--border);
      padding: 10px 14px;
      margin-top: 10px;
      border-radius: 0 6px 6px 0;
      font-size: 0.875rem;
    }
    .analogy::before { content: "💭 比喩："; font-weight: 700; font-style: normal; color: var(--accent); }

    /* 比較表 */
    .compare-section { margin: 24px 0; }
    .compare-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 400px; }
    th { background: var(--accent); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:nth-child(even) td { background: var(--surface); }
    tr:last-child td { border-bottom: none; }

    /* 結論 */
    .conclusion {
      background: var(--conclusion-bg);
      border: 2px solid var(--conclusion-border);
      border-radius: 10px;
      padding: 16px;
      margin: 24px 0;
    }
    .conclusion-title { font-weight: 700; margin-bottom: 8px; font-size: 1rem; }
    .conclusion p { font-size: 0.9rem; }

    /* 背景サマリー */
    .context-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 20px 0;
    }
    .context-summary-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 480px) { .context-grid { grid-template-columns: 1fr; } }
    .context-item { background: var(--bg); border-radius: 6px; padding: 8px 10px; }
    .context-item-label { font-size: 0.72rem; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
    .context-item-value { font-size: 0.85rem; color: var(--text); line-height: 1.5; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* チャットUI */
    .chat-section {
      margin-top: 32px;
      border-top: 2px solid var(--accent);
      padding-top: 20px;
    }
    .chat-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      min-height: 0;
    }
    .chat-bubble {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--chat-user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.bot {
      align-self: flex-start;
      background: var(--chat-bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.bot.streaming::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send-btn {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Q&A スレッド */
    .threads-section {
      margin-top: 32px;
      border-top: 2px solid var(--border);
      padding-top: 20px;
    }
    .threads-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .thread-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .thread-question {
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .thread-question::before { content: "Q "; color: var(--accent); font-weight: 800; }
    .thread-answer {
      background: var(--surface);
      padding: 12px 14px;
      font-size: 0.875rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }
    .thread-answer::before { content: "A "; color: var(--text-muted); font-weight: 700; }
    .thread-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 4px 14px 8px;
      background: var(--surface);
    }

    /* ダークモードトグル */
    .toggle-btn {
      position: fixed;
      bottom: 24px;
      right: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s;
      z-index: 100;
    }
    .toggle-btn:hover { transform: scale(1.04); }
    .error { text-align: center; color: var(--text-muted); padding: 60px 0; }

    /* 関連カード */
    .related-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
    .related-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); }
    .related-list { display: flex; flex-direction: column; gap: 8px; }
    .related-item { display: block; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text); transition: border-color 0.15s; }
    .related-item:hover { border-color: var(--accent); }
    .related-item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .related-item-tags { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← 一覧に戻る</a>
    <div id="content"><p style="color:var(--text-muted);text-align:center;padding:60px 0">読み込み中...</p></div>
  </div>

  <button class="toggle-btn" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span>
    <span id="themeLabel">ダーク</span>
  </button>

  <script>
    // ── ダークモード ──────────────────────────────────
    const root = document.documentElement;
    if (localStorage.getItem('graphrec-theme') === 'dark') {
      root.setAttribute('data-theme', 'dark');
      document.getElementById('themeIcon').textContent = '☀️';
      document.getElementById('themeLabel').textContent = 'ライト';
    }
    function toggleTheme() {
      const isDark = root.getAttribute('data-theme') === 'dark';
      if (isDark) {
        root.removeAttribute('data-theme');
        document.getElementById('themeIcon').textContent = '🌙';
        document.getElementById('themeLabel').textContent = 'ダーク';
        localStorage.setItem('graphrec-theme', 'light');
      } else {
        root.setAttribute('data-theme', 'dark');
        document.getElementById('themeIcon').textContent = '☀️';
        document.getElementById('themeLabel').textContent = 'ライト';
        localStorage.setItem('graphrec-theme', 'dark');
      }
    }

    // ── カード読み込み ─────────────────────────────────
    const cardId = new URLSearchParams(location.search).get('id');
    let currentCard = null;
    let allCards = [];

    if (!cardId) {
      document.getElementById('content').innerHTML = '<div class="error">カードIDが指定されていません</div>';
    } else {
      fetch('cards.json')
        .then(r => r.json())
        .then(data => {
          allCards = data.cards;
          const card = allCards.find(c => c.id === cardId);
          if (!card) {
            document.getElementById('content').innerHTML = '<div class="error">カードが見つかりません</div>';
            return;
          }
          currentCard = card;
          document.title = `${card.title} — Tech Cards`;
          renderCard(card);
        })
        .catch(() => {
          document.getElementById('content').innerHTML = '<div class="error">データの読み込みに失敗しました</div>';
        });
    }

    // ── ユーティリティ ────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── 用語解説：初出直後挿入 ────────────────────────
    // テキストブロック（body・bullet・analogy）を1行ずつ走査し、
    // 用語が初めて登場したブロックの直後に解説ボックスを挿入する。
    // どのブロックにも出てこない用語は表示しない。

    function termBoxHtml(term) {
      return `<div class="term-box">
          <div class="term-label">📖 用語解説：<strong>${term.word}</strong></div>
          <p>${term.desc}</p>
        </div>`;
    }

    // termMap: { keyword: term }
    function buildTermMap(terms) {
      const map = new Map();
      (terms || []).forEach(term => {
        const keyword = term.word.replace(/（.*）$/, '').trim();
        map.set(keyword, term);
      });
      return map;
    }

    // テキストブロックをHTMLに変換し、初出用語の直後に解説を挿入して返す
    function renderTextWithTerms(text, tag, termMap, usedTerms) {
      if (!text) return '';
      const blockHtml = tag === 'li'
        ? `<li>${text}</li>`
        : `<p>${text}</p>`;

      // このブロックに初出する用語を収集
      const toInsert = [];
      for (const [keyword, term] of termMap) {
        if (!usedTerms.has(keyword) && text.includes(keyword)) {
          toInsert.push(term);
          usedTerms.add(keyword);
        }
      }

      if (!toInsert.length) return blockHtml;
      return blockHtml + toInsert.map(t => termBoxHtml(t)).join('');
    }

    // ── カードレンダリング ─────────────────────────────
    function renderCard(c) {
      let html = '';

      // ヘッダー
      html += `
        <header class="page-header">
          <div class="page-title">🗺️ ${c.title}</div>
          ${c.subtitle ? `<div class="page-subtitle">${c.subtitle}</div>` : ''}
          <div class="meta">
            <span class="meta-date">${c.date}</span>
            <div class="tags">${(c.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </header>`;

      // セクション（用語解説を初出ブロックの直後に挿入）
      const termMap = buildTermMap(c.terms || []);
      const usedTerms = new Set();

      (c.sections || []).forEach(sec => {
        // body・bullets・analogy を1ブロックずつ処理し、初出直後に用語解説を挿入
        let bodyHtml = '';
        if (sec.body) {
          bodyHtml += renderTextWithTerms(sec.body, 'p', termMap, usedTerms);
        }
        let bulletsHtml = '';
        if (sec.bullets?.length) {
          const items = sec.bullets.map(b => renderTextWithTerms(b, 'li', termMap, usedTerms)).join('');
          bulletsHtml = `<ul>${items}</ul>`;
        }
        let analogyHtml = '';
        if (sec.analogy) {
          analogyHtml = `<div class="analogy">${sec.analogy}</div>`;
          // analogy にも用語があれば直後に挿入
          for (const [keyword, term] of termMap) {
            if (!usedTerms.has(keyword) && sec.analogy.includes(keyword)) {
              analogyHtml += termBoxHtml(term);
              usedTerms.add(keyword);
            }
          }
        }

        html += `
          <div class="section">
            <div class="section-heading">
              <span class="section-num">${sec.num}</span>
              <span>${sec.title}</span>
            </div>
            <div class="section-body">
              ${bodyHtml}${bulletsHtml}${analogyHtml}
            </div>
          </div>`;
      });

      // 比較表
      if (c.table) {
        html += `
          <hr class="divider">
          <div class="compare-section">
            <div class="compare-label">観点別 比較マトリクス</div>
            <div class="table-wrap">
              <table>
                <thead><tr>${c.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                <tbody>${c.table.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
              </table>
            </div>
          </div>`;
      }

      // 結論
      if (c.conclusion) {
        html += `
          <div class="conclusion">
            <div class="conclusion-title">💡 選び方の結論</div>
            <p>${c.conclusion}</p>
          </div>`;
      }

      // 背景サマリー
      const cs = c.context_summary;
      if (cs && (cs.context || cs.current || cs.confusion || cs.goal)) {
        html += `
          <hr class="divider">
          <div class="context-summary">
            <div class="context-summary-title">📋 このカードが生まれた背景</div>
            <div class="context-grid">
              ${cs.context  ? `<div class="context-item"><div class="context-item-label">🗂 文脈</div><div class="context-item-value">${cs.context}</div></div>`  : ''}
              ${cs.current  ? `<div class="context-item"><div class="context-item-label">📍 現在地</div><div class="context-item-value">${cs.current}</div></div>`  : ''}
              ${cs.confusion? `<div class="context-item"><div class="context-item-label">🔴 詰まり</div><div class="context-item-value">${cs.confusion}</div></div>`: ''}
              ${cs.goal     ? `<div class="context-item"><div class="context-item-label">🎯 ゴール</div><div class="context-item-value">${cs.goal}</div></div>`     : ''}
            </div>
          </div>`;
      }

      // 関連カード
      const related = allCards
        .filter(rc => rc.id !== c.id)
        .map(rc => ({ ...rc, score: rc.tags.filter(t => c.tags.includes(t)).length }))
        .filter(rc => rc.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
      if (related.length > 0) {
        const relatedItems = related.map(rc => `
          <a class="related-item" href="card.html?id=${rc.id}">
            <div class="related-item-title">${escapeHtml(rc.title)}</div>
            <div class="related-item-tags">${rc.tags.join(' ')}</div>
          </a>`).join('');
        html += `
          <div class="related-section">
            <div class="related-title">🔗 関連カード</div>
            <div class="related-list">${relatedItems}</div>
          </div>`;
      }

      // Q&A スレッド（過去のやり取り）
      if (c.threads && c.threads.length > 0) {
        const threadItems = c.threads.map(t => `
          <div class="thread-item">
            <div class="thread-question">${escapeHtml(t.question)}</div>
            <div class="thread-answer">${escapeHtml(t.answer)}</div>
            <div class="thread-date">${t.date}</div>
          </div>`).join('');
        html += `
          <div class="threads-section">
            <div class="threads-title">💬 Q&amp;A（${c.threads.length}件）</div>
            ${threadItems}
          </div>`;
      }

      // チャットUI
      html += `
        <div class="chat-section">
          <div class="chat-title">💬 このカードについて深掘りする</div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chatInput" placeholder="質問や気になる点を入力…" rows="1"
              onkeydown="handleChatKey(event)"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">送信</button>
          </div>
          <div class="chat-hint">Enter で送信 / Shift+Enter で改行</div>
        </div>`;

      document.getElementById('content').innerHTML = html;
    }

    // ── チャット ──────────────────────────────────────
    const chatHistory = [];

    function handleChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    }

    function appendBubble(role, text) {
      const el = document.createElement('div');
      el.className = `chat-bubble ${role}`;
      el.textContent = text;
      document.getElementById('chatMessages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return el;
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('chatSendBtn');
      const message = input.value.trim();
      if (!message || btn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;

      appendBubble('user', message);
      chatHistory.push({ role: 'user', content: message });

      const botBubble = appendBubble('bot', '');
      botBubble.classList.add('streaming');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            card: currentCard
              ? { id: currentCard.id, title: currentCard.title, subtitle: currentCard.subtitle, tags: currentCard.tags, conclusion: currentCard.conclusion }
              : null,
          }),
        });

        let data;
        try {
          data = await res.json();
        } catch (parseErr) {
          const raw = await res.text().catch(() => '(読み取り不可)');
          botBubble.classList.remove('streaming');
          botBubble.textContent = `⚠️ サーバーエラー (${res.status}): ${raw.slice(0, 200)}`;
          btn.disabled = false;
          return;
        }

        if (!res.ok || data.error) {
          botBubble.classList.remove('streaming');
          botBubble.textContent = `⚠️ ${data.error || 'エラーが発生しました'}`;
          btn.disabled = false;
          return;
        }

        botBubble.classList.remove('streaming');
        botBubble.textContent = data.reply;
        chatHistory.push({ role: 'assistant', content: data.reply });
      } catch (err) {
        botBubble.classList.remove('streaming');
        botBubble.textContent = `⚠️ 通信エラー: ${err.message}`;
      }

      btn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
